<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCode Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/navigation.js" defer></script>
    <script src="../js/scriptMulti.js" defer></script>
</head>
<body>
<header>
    <div class="header-content">
        <a href="/"><img src="../images/Logo.png" alt="Title Image"></a>
        <h1></h1>
    </div>
    <div class="auth-buttons" data-auth-links>
        <a href="/login" class="auth-link">Login</a>
        <a href="/register" class="auth-link">Register</a>
    </div>
</header>

<main>
    <section id="countdown-screen" class="screen">
        <h1>De game begint in...</h1>
        <p id="countdown-timer">3</p>
    </section>

    <section id="game-screen" class="screen">
        <h1>CodeFix Game</h1>
        <div class="game-container">
            <div class="game-info">
                <h3>Expected Output:</h3>
                <p id="expected-output"></p>
            </div>
            <div class="player-side">
                <h2>You</h2>
                <p id="code-display"></p>
                <input type="text" id="user-input" placeholder="Typ hier...">
                <p>Score: <span id="player-score">0</span></p>
            </div>
            <div class="player2-side">
                <h2>Player 2</h2>
                <p id="player2-code-display"></p>
                <input type="text" id="player2-input" disabled>
                <p>Score: <span id="player2-score">0</span></p>
            </div>
        </div>
    </section>

    <section class="scoreboard">
        <h2>Scoreboard</h2>
        <table>
            <thead>
            <tr>
                <th>Player</th>
                <th>Score</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Player 1</td>
                <td id="score1">0</td>
            </tr>
            <tr>
                <td>Player 2</td>
                <td id="score2">0</td>
            </tr>
            <tr>
                <td>Player 3</td>
                <td id="score3">0</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<footer>
    <div class="footer-content">
        <a href="#terms">Terms of Service</a>
        <a href="#privacy">Privacy Policy</a>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank" rel="noreferrer"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com" target="_blank" rel="noreferrer"><i class="fab fa-twitter"></i></a>
            <a href="https://instagram.com" target="_blank" rel="noreferrer"><i class="fab fa-instagram"></i></a>
            <a href="https://discord.com" target="_blank" rel="noreferrer"><i class="fab fa-discord"></i></a>
        </div>
    </div>
    <p>&copy; 2026 QuickCode. All rights reserved.</p>
</footer>
</body>
</html>
