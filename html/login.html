<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QuickCode Login</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/logIn.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/loginPage.js" defer></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="../images/Logo.png" alt="Title Image">
        <h1></h1>
    </div>
    <div class="auth-buttons">
        <a href="/" class="auth-link">Back To Main Menu</a>
    </div>
</header>

<main>
    <div class="login-box">
        <h1>QuickCode</h1>
        <p class="slogan">Conquer the code</p>
        <div id="login-error" style="color: red;"></div>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>
        <div class="footer mt-3">New to QuickCode? Join the fun today!</div>
    </div>
</main>

<footer>
    <div class="footer-content">
        <a href="#terms">Terms of Service</a>
        <a href="#privacy">Privacy Policy</a>
        <div class="social-icons">
            <a href="https://facebook.com/" target="_blank" rel="noreferrer"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com/" target="_blank" rel="noreferrer"><i class="fab fa-twitter"></i></a>
            <a href="https://instagram.com/" target="_blank" rel="noreferrer"><i class="fab fa-instagram"></i></a>
            <a href="https://discord.com/" target="_blank" rel="noreferrer"><i class="fab fa-discord"></i></a>
        </div>
    </div>
    <p>&copy; 2026 QuickCode. All rights reserved.</p>
</footer>

</body>
</html>
